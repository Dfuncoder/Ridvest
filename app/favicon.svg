<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0d2137"/>

  <!-- Keke body -->
  <rect x="10" y="24" width="38" height="20" rx="5" fill="#2563a8"/>

  <!-- Keke canopy -->
  <rect x="7" y="16" width="44" height="13" rx="5" fill="#1d4ed8"/>

  <!-- Front accent stripe -->
  <rect x="42" y="24" width="6" height="20" rx="2" fill="#f59e0b"/>

  <!-- Windshield -->
  <rect x="13" y="19" width="13" height="10" rx="2" fill="#bfdbfe" opacity="0.9"/>

  <!-- Side window -->
  <rect x="29" y="19" width="10" height="10" rx="2" fill="#bfdbfe" opacity="0.7"/>

  <!-- Rear wheel -->
  <circle cx="17" cy="46" r="8" fill="#0d2137" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="17" cy="46" r="3" fill="#f59e0b"/>

  <!-- Front wheel -->
  <circle cx="46" cy="46" r="8" fill="#0d2137" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="46" cy="46" r="3" fill="#f59e0b"/>

  <!-- Naira coin on roof -->
  <circle cx="52" cy="16" r="8" fill="#f59e0b"/>
  <text x="52" y="20" text-anchor="middle" font-size="9" font-weight="800" fill="#0d2137" font-family="Arial,sans-serif">₦</text>
</svg>
